spring.application.name=open-banking-service
server.port=8082

#Persistance
spring.datasource.url=jdbc:postgresql://localhost:5433/home_banking
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Enable Banking
enablebanking.api.base-url=https://api.enablebanking.com
enablebanking.api.redirect-url=https://twila-decrepit-kiley.ngrok-free.dev/api/v1/open-banking/callback

#Secrets
spring.config.import=optional:classpath:keys/secrets.properties

#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
kafka.topics.transactions-raw=transactions.raw
kafka.topics.account-update=account.update