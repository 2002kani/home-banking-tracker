spring.application.name=open-banking-service
server.port=8082

#Persistance
spring.datasource.url=jdbc:postgresql://localhost:5433/home_banking
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl.auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Enable Banking
enablebanking.api.base-url=https://api.enablebanking.com
enablebanking.api.redirect-url=https://twila-decrepit-kiley.ngrok-free.dev/api/v1/home-banking/callback

#Secrets
spring.config.import=optional:classpath:keys/secrets.properties