spring.application.name=account-service
server.port=8081

#persistence
spring.datasource.url=jdbc:postgresql://localhost:5433/account_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Client
open-banking.api.base-url=http://localhost:8082/api/v1/open-banking

#Secrets
spring.config.import=optional:classpath:keys/secrets.properties

#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=account-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.home_banking.account_service.event.AccountUpdateEvent
kafka.topics.account-update=account.update