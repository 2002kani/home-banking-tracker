spring.application.name=transaction-service
server.port=8080

#Persistance
spring.datasource.url=jdbc:postgresql://localhost:5433/transaction_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Secrets
spring.config.import=optional:classpath:keys/secrets.properties

#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=transaction-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.home_banking.transaction_service.event.TransactionEvent
kafka.topics.transactions-raw=transactions.raw