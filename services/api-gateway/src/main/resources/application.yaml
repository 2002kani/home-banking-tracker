server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: transaction-service
              uri: http://transaction-service:8080
              predicates:
                - Path=/api/v1/transactions/**, /api/v1/transaction/**, /api/v1/transactions, /api/v1/categories/**, /api/v1/categories, /api/v1/category/**
            - id: account-service
              uri: http://account-service:8081
              predicates:
                - Path=/api/v1/account, /api/v1/account/**
            - id: auth-service
              uri: http://auth-service:8083
              predicates:
                - Path=/api/v1/auth/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG