server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: transaction-service
            uri: http://localhost:8080
            predicates:
              - Path=/api/v1/transactions/**, /api/v1/transaction/**
          - id: account-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/account, /api/v1/account/**
          - id: auth-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/auth/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG